<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Gửi Mail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-label {
            font-weight: bold;
            color: #555;
        }
        .info-value {
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .result pre {
            margin: 10px 0 0 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Test Gửi Mail</h1>
        <p class="subtitle">Kiểm tra cấu hình và gửi mail thử nghiệm</p>

        <!-- Kiểm tra cấu hình -->
        <div class="section">
            <h2>1. Cấu hình Mail hiện tại</h2>
            <div id="config-info">
                <div class="info-item">
                    <span class="info-label">Đang tải...</span>
                    <span class="info-value"></span>
                </div>
            </div>
            <button onclick="checkConfig()" style="margin-top: 15px;">🔄 Làm mới</button>
        </div>

        <!-- Gửi mail test -->
        <div class="section">
            <h2>2. Gửi Mail Test</h2>
            <div class="form-group">
                <label for="test-email">Email nhận thử:</label>
                <input 
                    type="email" 
                    id="test-email" 
                    placeholder="your-email@example.com"
                    value=""
                >
            </div>
            <button onclick="sendTestMail()" id="send-btn">
                📨 Gửi Mail Test
            </button>
            <div id="result" class="result"></div>
        </div>
    </div>

    <script>
        // Kiểm tra cấu hình khi load trang
        window.onload = function() {
            checkConfig();
        };

        async function checkConfig() {
            try {
                const response = await fetch('/api/test-mail/config');
                const data = await response.json();
                
                const configHtml = `
                    <div class="info-item">
                        <span class="info-label">Mail Driver:</span>
                        <span class="info-value">${data.mail_driver}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Mail Host:</span>
                        <span class="info-value">${data.mail_host || 'Chưa cấu hình'}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Mail Port:</span>
                        <span class="info-value">${data.mail_port || 'Chưa cấu hình'}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Mail Username:</span>
                        <span class="info-value">${data.mail_username}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">From Address:</span>
                        <span class="info-value">${data.mail_from_address || 'Chưa cấu hình'}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">From Name:</span>
                        <span class="info-value">${data.mail_from_name || 'Chưa cấu hình'}</span>
                    </div>
                    <div class="info-item" style="margin-top: 10px; padding-top: 10px; border-top: 2px solid #ddd;">
                        <span class="info-label" style="color: #667eea;">📝 Ghi chú:</span>
                        <span class="info-value" style="color: #667eea;">${data.note}</span>
                    </div>
                `;
                
                document.getElementById('config-info').innerHTML = configHtml;
            } catch (error) {
                document.getElementById('config-info').innerHTML = `
                    <div class="info-item">
                        <span class="info-label" style="color: red;">Lỗi:</span>
                        <span class="info-value" style="color: red;">${error.message}</span>
                    </div>
                `;
            }
        }

        async function sendTestMail() {
            const email = document.getElementById('test-email').value;
            const sendBtn = document.getElementById('send-btn');
            const resultDiv = document.getElementById('result');

            if (!email) {
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '⚠️ Vui lòng nhập email!';
                return;
            }

            // Disable button và hiển thị loading
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span> Đang gửi...';
            resultDiv.style.display = 'none';

            try {
                const response = await fetch('/api/test-mail/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json();

                resultDiv.style.display = 'block';
                
                if (data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        ✅ <strong>${data.message}</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        ❌ <strong>${data.message}</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `❌ <strong>Lỗi:</strong> ${error.message}`;
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = '📨 Gửi Mail Test';
            }
        }
    </script>
</body>
</html>
